spring.application.name=yomu-reading-service
spring.config.import=optional:file:.env[.properties]
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=${H2_WEB_ALLOW_OTHERS:false}
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/yomu-db-v2;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
spring.web.error.whitelabel.enabled=false
spring.web.error.path=/error
server.servlet.session.timeout=${SESSION_TIMEOUT:15m}
app.security.throttle.login-failed-max-attempts=${LOGIN_FAILED_MAX_ATTEMPTS:5}
app.security.throttle.login-failed-window-seconds=${LOGIN_FAILED_WINDOW_SECONDS:300}
app.security.throttle.register-max-attempts=${REGISTER_MAX_ATTEMPTS:5}
app.security.throttle.register-window-seconds=${REGISTER_WINDOW_SECONDS:300}
server.port=${PORT:8081}

# Reading Service client base URL (Strangler Fig)
reading.service.base-url=${READING_SERVICE_BASE_URL:http://localhost:8081}

# Google OAuth2

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
