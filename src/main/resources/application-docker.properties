spring.datasource.url=jdbc:h2:file:/app/data/yomu-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:yomu}
spring.datasource.password=${DB_PASSWORD}
spring.h2.console.enabled=false
app.h2.tcp.enabled=false
app.h2.tcp.port=9092
app.h2.tcp.allow-others=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=false
server.servlet.session.timeout=${SESSION_TIMEOUT:15m}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
